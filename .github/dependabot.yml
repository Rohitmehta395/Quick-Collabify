version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    ignore:
      # Next.js 15+ sometimes introduces breaking React 19 API changes, ignore automatic major bumps
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
    labels:
      - 'dependencies'
      - 'javascript'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'
      - 'actions'
